<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Dark background with rounded corners -->
  <rect width="192" height="192" rx="42" fill="#1A1A1A"/>
  <!-- Subtle warm glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#2a2218"/>
    <stop offset="100%" stop-color="#1A1A1A"/>
  </radialGradient>
  <rect width="192" height="192" rx="42" fill="url(#glow)"/>

  <!-- 3×3 bingo grid -->
  <!-- Row 1 -->
  <rect x="24" y="24" width="44" height="44" rx="8" fill="rgba(255,255,255,0.12)"/>
  <rect x="74" y="24" width="44" height="44" rx="8" fill="rgba(255,255,255,0.12)"/>
  <!-- marked -->
  <rect x="124" y="24" width="44" height="44" rx="8" fill="#B45309"/>
  <text x="146" y="54" text-anchor="middle" font-size="22" fill="#fff" font-family="sans-serif" font-weight="900">✓</text>

  <!-- Row 2 -->
  <!-- marked -->
  <rect x="24" y="74" width="44" height="44" rx="8" fill="#B45309"/>
  <text x="46" y="104" text-anchor="middle" font-size="22" fill="#fff" font-family="sans-serif" font-weight="900">✓</text>
  <!-- FREE centre -->
  <rect x="74" y="74" width="44" height="44" rx="8" fill="rgba(255,255,255,0.92)"/>
  <text x="96" y="104" text-anchor="middle" font-size="20" fill="#C2410C" font-family="sans-serif" font-weight="900">★</text>
  <rect x="124" y="74" width="44" height="44" rx="8" fill="rgba(255,255,255,0.12)"/>

  <!-- Row 3 -->
  <rect x="24" y="124" width="44" height="44" rx="8" fill="rgba(255,255,255,0.12)"/>
  <!-- marked -->
  <rect x="74" y="124" width="44" height="44" rx="8" fill="#B45309"/>
  <text x="96" y="154" text-anchor="middle" font-size="22" fill="#fff" font-family="sans-serif" font-weight="900">✓</text>
  <!-- marked -->
  <rect x="124" y="124" width="44" height="44" rx="8" fill="#B45309"/>
  <text x="146" y="154" text-anchor="middle" font-size="22" fill="#fff" font-family="sans-serif" font-weight="900">✓</text>
</svg>
