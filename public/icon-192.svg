<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- 3x3 bingo grid -->
  <rect x="28" y="28" width="40" height="40" rx="7" fill="rgba(255,255,255,0.25)"/>
  <rect x="76" y="28" width="40" height="40" rx="7" fill="rgba(255,255,255,0.25)"/>
  <rect x="124" y="28" width="40" height="40" rx="7" fill="rgba(255,255,255,0.25)"/>
  <rect x="28" y="76" width="40" height="40" rx="7" fill="rgba(255,255,255,0.25)"/>
  <!-- centre free space -->
  <rect x="76" y="76" width="40" height="40" rx="7" fill="rgba(255,255,255,0.9)"/>
  <text x="96" y="102" text-anchor="middle" font-size="22" fill="#7c3aed" font-family="sans-serif" font-weight="900">★</text>
  <rect x="124" y="76" width="40" height="40" rx="7" fill="rgba(255,255,255,0.25)"/>
  <!-- bottom row: marked, unmarked, marked -->
  <rect x="28" y="124" width="40" height="40" rx="7" fill="rgba(255,255,255,0.85)"/>
  <text x="48" y="150" text-anchor="middle" font-size="22" fill="#7c3aed" font-family="sans-serif" font-weight="900">✓</text>
  <rect x="76" y="124" width="40" height="40" rx="7" fill="rgba(255,255,255,0.25)"/>
  <rect x="124" y="124" width="40" height="40" rx="7" fill="rgba(255,255,255,0.85)"/>
  <text x="144" y="150" text-anchor="middle" font-size="22" fill="#7c3aed" font-family="sans-serif" font-weight="900">✓</text>
</svg>
