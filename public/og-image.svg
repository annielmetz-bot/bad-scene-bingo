<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="60%" style="stop-color:#1c1c1c"/>
      <stop offset="100%" style="stop-color:#2a2218"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="60%" r="55%">
      <stop offset="0%" style="stop-color:#B45309;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#111111;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="126" x2="1200" y2="126" stroke="white" stroke-width="1"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="white" stroke-width="1"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="white" stroke-width="1"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="white" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="white" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="white" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Emoji -->
  <text x="600" y="195" text-anchor="middle" font-size="100">😬</text>

  <!-- Title -->
  <text x="600" y="300" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="88" font-weight="900" fill="white" letter-spacing="-2">Bad Scene</text>

  <!-- Divider line -->
  <line x1="576" y1="318" x2="624" y2="318" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>

  <!-- BINGO -->
  <text x="600" y="400" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="96" font-weight="900" font-style="italic" fill="rgba(255,255,255,0.92)"
        letter-spacing="18">BINGO</text>

  <!-- Tagline -->
  <text x="600" y="468" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="400" font-style="italic" fill="rgba(255,255,255,0.65)">
    Find the humor. Survive together.
  </text>
</svg>
